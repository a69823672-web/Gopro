<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>مدیریت اجاره دوربین GoPro</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>📷 مدیریت اجاره دوربین GoPro</h1>

    <!-- افزودن دوربین -->
    <div class="card">

        <h2>➕ افزودن دوربین</h2>

        <div class="add-box">

            <input
                type="text"
                id="cameraCode"
                placeholder="کد دوربین (مثلاً GP001)"
            >

            <button class="add" onclick="addCamera()">
                افزودن
            </button>

        </div>

    </div>

    <!-- دوربین‌های موجود -->
    <div class="card">

        <h2>📷 دوربین‌های موجود</h2>

        <div id="available">

            <div class="empty">
                هنوز دوربینی ثبت نشده است.
            </div>

        </div>

    </div>

    <!-- دوربین‌های اجاره داده شده -->
    <div class="card">

        <h2>📦 دوربین‌های اجاره داده شده</h2>

        <div id="rented">

            <div class="empty">
                هنوز دوربینی اجاره داده نشده است.
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
